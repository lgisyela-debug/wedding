<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wedding Frame</title>

<style>
body{
    font-family:Arial;
    text-align:center;
}

canvas{
    border:1px solid #ccc;
    width:350px;
}

.controls{
    margin:10px;
}
</style>
</head>
<body>

<h1>Wedding Of Rengga & Agustine</h1>

<div class="controls">
    Foto Atas<br>
    <input type="file" id="foto1"><br>
    Zoom:
    <input type="range" id="zoom1" min="0.05" max="5" step="0.05" value="1">
</div>

<div class="controls">
    Foto Bawah<br>
    <input type="file" id="foto2"><br>
    Zoom:
    <input type="range" id="zoom2" min="0.05" max="5" step="0.05" value="1">
</div>

<button onclick="downloadImage()">Download</button>

<br><br>

<canvas id="canvas" width="1080" height="1920"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img1 = null;
let img2 = null;

let pos1 = {x:80,y:350};
let pos2 = {x:150,y:950};

let dragging = null;

const frame = new Image();
frame.src = "template.png";

document.getElementById("foto1").onchange = e=>{
    img1 = new Image();
    img1.onload = draw;
    img1.src = URL.createObjectURL(e.target.files[0]);
}

document.getElementById("foto2").onchange = e=>{
    img2 = new Image();
    img2.onload = draw;
    img2.src = URL.createObjectURL(e.target.files[0]);
}

document.getElementById("zoom1").oninput = draw;
document.getElementById("zoom2").oninput = draw;

frame.onload = draw;

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(img1){

    let scale = parseFloat(document.getElementById("zoom1").value);

    ctx.save();

    ctx.beginPath();
    ctx.rect(110,430,760,589);
    ctx.clip();

    ctx.drawImage(
        img1,
        pos1.x,
        pos1.y,
        img1.width*0.7*scale,
img1.height*0.7*scale
    );

    ctx.restore();
}

if(img2){

    let scale = parseFloat(document.getElementById("zoom2").value);

    ctx.save();

    ctx.beginPath();

ctx.rect(245,1030,760,620);
    ctx.clip();

    ctx.drawImage(
        img2,
        pos2.x,
        pos2.y,
        img2.width*0.7*scale,
img2.height*0.7*scale
    );

    ctx.restore();
}

    ctx.drawImage(frame,0,0,1080,1920);
}

canvas.addEventListener("mousedown",e=>{

    let rect=canvas.getBoundingClientRect();

    let x=(e.clientX-rect.left)*(canvas.width/rect.width);
    let y=(e.clientY-rect.top)*(canvas.height/rect.height);

    if(y<1000){
        dragging="foto1";
    }else{
        dragging="foto2";
    }

});

canvas.addEventListener("mousemove",e=>{

    if(!dragging) return;

    let rect=canvas.getBoundingClientRect();

    let x=(e.clientX-rect.left)*(canvas.width/rect.width);
    let y=(e.clientY-rect.top)*(canvas.height/rect.height);

    if(dragging==="foto1"){
        pos1.x=x-150;
        pos1.y=y-150;
    }

    if(dragging==="foto2"){
        pos2.x=x-150;
        pos2.y=y-150;
    }

    draw();

});

canvas.addEventListener("mouseup",()=>{
    dragging = null;
});

canvas.addEventListener("mouseleave",()=>{
    dragging = null;
});

canvas.addEventListener("touchstart",e=>{

    let rect=canvas.getBoundingClientRect();

    let touch=e.touches[0];

    let x=(touch.clientX-rect.left)*(canvas.width/rect.width);
    let y=(touch.clientY-rect.top)*(canvas.height/rect.height);

    if(x>=110 && x<=850 && y>=450 && y<=970){
        dragging="foto1";
    }
    else if(x>=250 && x<=1010 && y>=1060 && y<=1580){
        dragging="foto2";
    }

});

canvas.addEventListener("touchmove",e=>{

    if(!dragging) return;

    e.preventDefault();

    let rect=canvas.getBoundingClientRect();

    let touch=e.touches[0];

    let x=(touch.clientX-rect.left)*(canvas.width/rect.width);
    let y=(touch.clientY-rect.top)*(canvas.height/rect.height);

    if(dragging==="foto1"){
        pos1.x=x-150;
        pos1.y=y-150;
    }

    if(dragging==="foto2"){
        pos2.x=x-150;
        pos2.y=y-150;
    }

    draw();

});

canvas.addEventListener("touchend",()=>{
    dragging=null;
});

function downloadImage(){

    const a=document.createElement("a");
    a.download="Wedding-Rengga-Agustine.png";
    a.href=canvas.toDataURL();
    a.click();

}

</script>

</body>
</html>
