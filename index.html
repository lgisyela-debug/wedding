<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wedding Frame</title>

<style>
body{
    font-family:Arial;
    text-align:center;
}

canvas{
    border:1px solid #ccc;
    width:350px;
}

.controls{
    margin:10px;
}
</style>
</head>
<body>

<h1>Wedding Of Rengga & Agustine</h1>

<div class="controls">
    Foto Atas<br>
    <input type="file" id="foto1"><br>
    Zoom:
    Zoom:
<input type="range" id="zoom1" min="0.05" max="5" step="0.05" value="1">
<br>
Rotate:
<button onclick="rotateLeft1()">↺</button>
<button onclick="rotateRight1()">↻</button>
<button onclick="flipPhoto1()">Mirror Foto Atas</button>
</div>

<div class="controls">
    Foto Bawah<br>
    <input type="file" id="foto2"><br>
    Zoom:
    Zoom:
<input type="range" id="zoom2" min="0.05" max="5" step="0.05" value="1">
<br>
Rotate:
<button onclick="rotateLeft2()">↺</button>
<button onclick="rotateRight2()">↻</button>
<button onclick="flipPhoto2()">Mirror Foto Bawah</button>
</div>

<button onclick="resetAll()">Reset</button>
<button onclick="downloadImage()">Download</button>

<br><br>

<canvas id="canvas" width="1080" height="1920"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img1 = null;
let img2 = null;

let pos1 = {x:80,y:350};
let pos2 = {x:150,y:950};

let dragging = null;
let rotation1 = 0;
let rotation2 = 0;

let flip1 = 1;
let flip2 = 1;

const frame = new Image();
frame.src = "template.png";

document.getElementById("foto1").onchange = e=>{
    img1 = new Image();
    img1.onload = draw;
    img1.src = URL.createObjectURL(e.target.files[0]);
}

document.getElementById("foto2").onchange = e=>{
    img2 = new Image();
    img2.onload = draw;
    img2.src = URL.createObjectURL(e.target.files[0]);
}

document.getElementById("zoom1").oninput = draw;
document.getElementById("zoom2").oninput = draw;


frame.onload = draw;

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(img1){

    let scale = parseFloat(document.getElementById("zoom1").value);

    ctx.save();

    ctx.beginPath();
    ctx.rect(109,429,762,591);
    ctx.clip();

    let angle = rotation1 * Math.PI / 180;

ctx.translate(
    pos1.x + (img1.width*0.25*scale)/2,
    pos1.y + (img1.height*0.25*scale)/2
);

// ctx.rotate(angle);
// ctx.scale(flip1,1);

ctx.drawImage(
    img1,
    -(img1.width*0.25*scale)/2,
    -(img1.height*0.25*scale)/2,
    img1.width*0.25*scale,
    img1.height*0.25*scale
);

    ctx.restore();
}

if(img2){

    let scale = parseFloat(document.getElementById("zoom2").value);

    ctx.save();

    ctx.beginPath();

ctx.rect(244,1029,762,622);
    ctx.clip();

    let angle = rotation2 * Math.PI / 180;
ctx.translate(
    pos2.x + (img2.width*0.25*scale)/2,
    pos2.y + (img2.height*0.25*scale)/2
);

// ctx.rotate(angle);
// ctx.scale(flip2,1);

ctx.drawImage(
    img2,
    -(img2.width*0.25*scale)/2,
    -(img2.height*0.25*scale)/2,
    img2.width*0.25*scale,
    img2.height*0.25*scale
);

    ctx.restore();
}

    ctx.imageSmoothingEnabled = true;
// ctx.drawImage(frame,0,0,1080,1920);
}

canvas.addEventListener("mousedown",e=>{

    let rect=canvas.getBoundingClientRect();

    let x=(e.clientX-rect.left)*(canvas.width/rect.width);
    let y=(e.clientY-rect.top)*(canvas.height/rect.height);

    if(y<1000){
        dragging="foto1";
    }else{
        dragging="foto2";
    }

});

canvas.addEventListener("mousemove",e=>{

    if(!dragging) return;

    let rect=canvas.getBoundingClientRect();

    let x=(e.clientX-rect.left)*(canvas.width/rect.width);
    let y=(e.clientY-rect.top)*(canvas.height/rect.height);

    if(dragging==="foto1"){
        pos1.x=x-150;
        pos1.y=y-150;
    }

    if(dragging==="foto2"){
        pos2.x=x-150;
        pos2.y=y-150;
    }

    draw();

});

canvas.addEventListener("mouseup",()=>{
    dragging = null;
});

canvas.addEventListener("mouseleave",()=>{
    dragging = null;
});

canvas.addEventListener("touchstart",e=>{

    let rect=canvas.getBoundingClientRect();

    let touch=e.touches[0];

    let x=(touch.clientX-rect.left)*(canvas.width/rect.width);
    let y=(touch.clientY-rect.top)*(canvas.height/rect.height);

    if(x>=110 && x<=850 && y>=450 && y<=970){
        dragging="foto1";
    }
    else if(x>=250 && x<=1010 && y>=1060 && y<=1580){
        dragging="foto2";
    }

});

canvas.addEventListener("touchmove",e=>{

    if(!dragging) return;

    e.preventDefault();

    let rect=canvas.getBoundingClientRect();

    let touch=e.touches[0];

    let x=(touch.clientX-rect.left)*(canvas.width/rect.width);
    let y=(touch.clientY-rect.top)*(canvas.height/rect.height);

    if(dragging==="foto1"){
        pos1.x=x-150;
        pos1.y=y-150;
    }

    if(dragging==="foto2"){
        pos2.x=x-150;
        pos2.y=y-150;
    }

    draw();

});

canvas.addEventListener("touchend",()=>{
    dragging=null;
});

function rotateRight1(){
    rotation1 += 90;
    draw();
}

function rotateLeft1(){
    rotation1 -= 90;
    draw();
}

function rotateRight2(){
    rotation2 += 90;
    draw();
}

function rotateLeft2(){
    rotation2 -= 90;
    draw();
}
function flipPhoto1(){
    flip1 *= -1;
    draw();
}

function flipPhoto2(){
    flip2 *= -1;
    draw();
}

function resetAll(){

    pos1 = {x:80,y:350};
    pos2 = {x:150,y:950};

    rotation1 = 0;
    rotation2 = 0;

    flip1 = 1;
    flip2 = 1;

    document.getElementById("zoom1").value = 1;
    document.getElementById("zoom2").value = 1;

    draw();
}

function downloadImage(){

    const a=document.createElement("a");
    a.download="Wedding-Rengga-Agustine.png";
    a.href=canvas.toDataURL();
    a.click();

}

</script>

</body>
</html>
